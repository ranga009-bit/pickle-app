<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Grama Pickles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-amber-50 font-sans">

<!-- NAVBAR -->
<div class="bg-amber-900 text-white p-4 shadow-lg">
  <h1 class="text-xl font-bold">🌿 Grama Pickles Checkout</h1>
</div>

<div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 p-6 mt-6">

  <!-- ORDER SUMMARY -->
  <div class="bg-white rounded-3xl shadow-xl p-6">
    <h2 class="text-2xl font-bold text-amber-900 mb-4">Order Summary</h2>

    <div id="cartItems" class="space-y-3"></div>

    <div class="border-t mt-5 pt-4">
      <h3 id="total" class="text-xl font-bold text-amber-900"></h3>
    </div>

    <button onclick="goBack()" class="mt-6 w-full bg-gray-200 text-gray-800 p-3 rounded-xl hover:bg-gray-300 transition">
      ← Back to Cart
    </button>
  </div>

  <!-- CUSTOMER DETAILS -->
  <div class="bg-white rounded-3xl shadow-xl p-6">
    <h2 class="text-2xl font-bold text-amber-900 mb-4">Delivery Details</h2>

    <input id="name" placeholder="Full Name"
      class="w-full border border-amber-200 p-3 mb-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-700">

    <input id="phone" placeholder="Phone Number"
      class="w-full border border-amber-200 p-3 mb-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-700">

    <textarea id="address" placeholder="Full Address"
      class="w-full border border-amber-200 p-3 mb-4 rounded-xl h-28 focus:outline-none focus:ring-2 focus:ring-amber-700"></textarea>

    <button onclick="placeOrder()"
      class="w-full bg-amber-900 text-white p-3 rounded-xl font-semibold hover:bg-amber-800 active:scale-95 transition">
      Place Order
    </button>

    <p class="text-sm text-gray-500 mt-3 text-center">
      We will contact you after order confirmation.
    </p>
  </div>

</div>

<script>
const cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

cart.forEach(item => {
  total += item.price;

  html += `
    <div class="flex justify-between items-center bg-amber-50 p-3 rounded-xl">
      <div>
        <p class="font-semibold text-amber-900">${item.name}</p>
        <p class="text-sm text-amber-700">₹${item.price}</p>
      </div>
    </div>
  `;
});

document.getElementById("cartItems").innerHTML = html || "<p>Your cart is empty.</p>";
document.getElementById("total").innerText = "Total ₹" + total;

function placeOrder(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Please fill all details");
    return;
  }

  const orderData = {
    items: cart,
    total: total,
    customerName: name,
    phone: phone,
    address: address
  };

  fetch("http://localhost:5000/place-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(orderData)
  })
  .then(res => res.json())
  .then(data => {
    localStorage.removeItem("cart");

    document.body.innerHTML = `
      <div class="min-h-screen bg-amber-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl shadow-2xl p-8 text-center max-w-md">
          <h1 class="text-3xl font-bold text-green-700 mb-3">✅ Order Confirmed</h1>
          <p class="text-gray-700">Your order has been placed successfully.</p>
          <p class="mt-4 text-sm text-gray-500">Order ID</p>
          <h2 class="text-xl font-bold text-amber-900">${data.orderId}</h2>
          <p class="mt-4 text-gray-600">We will contact you soon for confirmation.</p>
          <button onclick="window.location='index.html'" class="mt-6 bg-amber-900 text-white px-6 py-3 rounded-xl">
            Back to Home
          </button>
        </div>
      </div>
    `;
  });
}

function goBack(){
  window.location = "index.html";
}
</script>

</body>
</html>
