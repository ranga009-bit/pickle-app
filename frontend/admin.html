<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-amber-50 font-sans">

<!-- NAVBAR -->
<div class="bg-amber-900 text-white p-4 shadow-lg">
  <h1 class="text-xl font-bold">📊 Admin Dashboard</h1>
</div>

<div class="p-6">

  <h2 class="text-2xl font-bold text-amber-900 mb-4">Orders</h2>

  <div id="orders" class="grid gap-4"></div>

</div>

<script>
fetch("http://localhost:5000/orders")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("orders");

  if(data.length === 0){
    container.innerHTML = "<p>No orders yet.</p>";
    return;
  }

  data.reverse().forEach(order => {

    let itemsHTML = "";

    order.items.forEach(item => {
      itemsHTML += `
        <li>${item.name} × ${item.quantity || 1}</li>
      `;
    });

    container.innerHTML += `
      <div class="bg-white p-5 rounded-2xl shadow-lg">

        <div class="flex justify-between mb-2">
          <h3 class="font-bold text-amber-900">Order ID</h3>
          <span class="text-sm text-gray-500">${order._id}</span>
        </div>

        <p><strong>Name:</strong> ${order.customerName}</p>
        <p><strong>Phone:</strong> ${order.phone}</p>
        <p><strong>Address:</strong> ${order.address}</p>

        <div class="mt-3">
          <p class="font-semibold">Items:</p>
          <ul class="list-disc ml-5">${itemsHTML}</ul>
        </div>

        <div class="mt-3 flex justify-between items-center">
          <p class="font-bold text-amber-900">Total ₹${order.total}</p>
          <span class="text-xs text-gray-500">
            ${new Date(order.date).toLocaleString()}
          </span>
        </div>

      </div>
    `;
  });
});
</script>

</body>
</html>
