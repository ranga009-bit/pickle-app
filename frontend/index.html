<!DOCTYPE html>
<html>
<head>
  <title>Grama Pickles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-amber-50 font-sans">

<div class="bg-amber-900 text-white p-4 flex justify-between items-center fixed top-0 w-full z-50 shadow-lg">
  <h1 class="text-xl font-bold">🌿 Grama Pickles</h1>

  <div class="cursor-pointer bg-black px-4 py-2 rounded-full hover:scale-105 transition" onclick="toggleCart()">
    🛒 <span id="count">0</span>
  </div>
</div>

<section class="mt-20 text-center py-12 px-4 bg-gradient-to-b from-amber-100 to-amber-50">
  <h2 class="text-4xl font-bold text-amber-900 mb-3">Authentic Homemade Pickles</h2>
  <p class="text-amber-800 max-w-xl mx-auto">
    Traditional South Indian flavours made with love, spice, and village-style recipes.
  </p>
</section>

<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-10 p-8"></div>

<div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-10"></div>

<div id="cartPanel"
  class="fixed top-0 right-[-350px] w-80 h-full bg-white shadow-2xl p-5 transition-all duration-300 z-40 overflow-y-auto">

  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold text-amber-900">Your Cart</h2>
    <button onclick="toggleCart()" class="text-red-500 text-xl">✖</button>
  </div>

  <div id="cartItems" class="space-y-3"></div>

  <h3 id="total" class="mt-4 font-bold text-amber-900"></h3>

  <button onclick="goToCheckout()" class="mt-4 w-full bg-amber-900 text-white p-3 rounded-lg hover:bg-amber-800 transition">
    Checkout
  </button>
</div>

<script>
let cart = [];

fetch("http://localhost:5000/products")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("products");

  data.forEach(p => {
    container.innerHTML += `
      <div class="bg-white rounded-3xl shadow-lg overflow-hidden transition-all duration-500 hover:scale-[1.03] hover:shadow-2xl group">
        <div class="overflow-hidden">
          <img src="${p.image}" class="w-full h-64 object-cover transition-transform duration-500 group-hover:scale-110">
        </div>

        <div class="p-5 text-center bg-gradient-to-b from-white to-amber-50">
          <h3 class="font-bold text-xl text-amber-900 tracking-wide">${p.name}</h3>
          <p class="text-amber-700 font-semibold mt-1 text-lg">₹${p.price}</p>

          <button
            class="mt-4 px-6 py-2 rounded-full bg-amber-900 text-white shadow-md hover:bg-amber-800 hover:shadow-lg active:scale-95 transition-all duration-300"
            onclick='addToCart(${JSON.stringify(p)})'>
            Add to Cart
          </button>
        </div>
      </div>
    `;
  });
});

function addToCart(product){
  const existing = cart.find(item => item._id === product._id);

  if(existing){
    existing.quantity += 1;
  } else {
    cart.push({
      ...product,
      quantity: 1
    });
  }

  updateCart();
}

function increaseQty(index){
  cart[index].quantity += 1;
  updateCart();
}

function decreaseQty(index){
  if(cart[index].quantity > 1){
    cart[index].quantity -= 1;
  } else {
    cart.splice(index, 1);
  }

  updateCart();
}

function removeItem(index){
  cart.splice(index, 1);
  updateCart();
}

function updateCart(){
  let total = 0;
  let html = "";
  let itemCount = 0;

  cart.forEach((item, index) => {
    total += item.price * item.quantity;
    itemCount += item.quantity;

    html += `
      <div class="bg-amber-50 p-3 rounded-xl shadow-sm">
        <div class="flex justify-between items-start">
          <div>
            <p class="font-semibold text-amber-900">${item.name}</p>
            <p class="text-sm text-amber-800">₹${item.price} × ${item.quantity}</p>
          </div>

          <button onclick="removeItem(${index})" class="text-red-500">❌</button>
        </div>

        <div class="flex items-center justify-between mt-3">
          <div class="flex items-center gap-3">
            <button onclick="decreaseQty(${index})" class="bg-amber-900 text-white w-8 h-8 rounded-full">−</button>
            <span class="font-bold">${item.quantity}</span>
            <button onclick="increaseQty(${index})" class="bg-amber-900 text-white w-8 h-8 rounded-full">+</button>
          </div>

          <p class="font-bold text-amber-900">₹${item.price * item.quantity}</p>
        </div>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html || "<p class='text-gray-500'>Your cart is empty.</p>";
  document.getElementById("total").innerText = "Total ₹" + total;
  document.getElementById("count").innerText = itemCount;
}

function toggleCart(){
  const panel = document.getElementById("cartPanel");
  const overlay = document.getElementById("overlay");

  if(panel.style.right === "0px"){
    panel.style.right = "-350px";
    overlay.classList.add("hidden");
  } else {
    panel.style.right = "0px";
    overlay.classList.remove("hidden");
  }
}

document.getElementById("overlay").onclick = toggleCart;

function goToCheckout(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  window.location = "checkout.html";
}
</script>

</body>
</html>
